name: Continuous Deployment (Gateway)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Fetch Active Auction Environment
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
        run: |
          ACTIVE_ENV=$(gh api -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" /repos/advprog-2026-B15-project/bidmart-auction/actions/variables/ACTIVE_ENV | jq -r .value || echo "blue")
          echo "Active env from Auction repo is: $ACTIVE_ENV"
          
          if [ "$ACTIVE_ENV" == "green" ]; then
            echo "DYNAMIC_AUCTION_URL=${{ secrets.AUCTION_SERVICE_URL_GREEN }}" >> $GITHUB_ENV
          else
            echo "DYNAMIC_AUCTION_URL=${{ secrets.AUCTION_SERVICE_URL_BLUE }}" >> $GITHUB_ENV
          fi

      - name: Build JAR with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar
          rm build/libs/*-plain.jar || true

      - name: Copy Dockerfile to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_GATEWAY_HOST }}
          username: ${{ secrets.EC2_GATEWAY_USERNAME }}
          key: ${{ secrets.EC2_GATEWAY_SSH_KEY }}
          source: "Dockerfile"
          target: "/home/ubuntu/"

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_GATEWAY_HOST }}
          username: ${{ secrets.EC2_GATEWAY_USERNAME }}
          key: ${{ secrets.EC2_GATEWAY_SSH_KEY }}
          source: "build/libs/"
          target: "/home/ubuntu/"

      - name: Execute Deployment on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DYNAMIC_AUCTION_URL: ${{ env.DYNAMIC_AUCTION_URL }}
        with:
          host: ${{ secrets.EC2_GATEWAY_HOST }}
          username: ${{ secrets.EC2_GATEWAY_USERNAME }}
          key: ${{ secrets.EC2_GATEWAY_SSH_KEY }}
          envs: DYNAMIC_AUCTION_URL
          script: |
            echo "1. Persiapan Deployment"

            echo "2. Hapus container Gateway lama"
            docker rm -f bidmart-gateway || true

            echo "3. Build image Docker baru dari JAR"
            docker build -t bidmart-gateway -f /home/ubuntu/Dockerfile /home/ubuntu/

            echo "4. Jalankan Gateway baru"
            docker run -d \
              --name bidmart-gateway \
              --network host \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e AUTH_SERVICE_URL='${{ secrets.AUTH_SERVICE_URL }}' \
              -e CATALOG_SERVICE_URL='${{ secrets.CATALOG_SERVICE_URL }}' \
              -e AUCTION_SERVICE_URL="$DYNAMIC_AUCTION_URL" \
              -e WALLET_SERVICE_URL='${{ secrets.WALLET_SERVICE_URL }}' \
              -e BOOKING_SERVICE_URL='${{ secrets.BOOKING_SERVICE_URL }}' \
              --restart always \
              bidmart-gateway

            echo "5. Tunggu 5 detik untuk memastikan Gateway berjalan"
            sleep 5
            
            echo "6. Cek status container dan logs"
            docker ps | grep bidmart-gateway
            docker logs --tail 50 bidmart-gateway
            
            echo "7. Bersihkan file instalasi & image bekas"
            rm /home/ubuntu/gateway-0.0.1-SNAPSHOT.jar || true
            rm -rf /home/ubuntu/build || true
            docker image prune -f
