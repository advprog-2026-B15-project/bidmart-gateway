name: Build and Push Docker Image

on:
  workflow_run:
    workflows:
      - "Continuous Integration"
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar 

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$REPO_LOWER:latest .
          docker push ghcr.io/$REPO_LOWER:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Gateway EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_GATEWAY_HOST }}
          username: ${{ secrets.EC2_GATEWAY_USERNAME }}
          key: ${{ secrets.EC2_GATEWAY_SSH_KEY }}
          script: |
            echo "Pulling latest image..."
            docker pull ghcr.io/${{ github.repository }}:latest
            
            echo "Deploying gateway..."
            docker stop bidmart-gateway || true
            docker rm bidmart-gateway || true
            docker run -d --name bidmart-gateway \
              --network host \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e AUTH_SERVICE_URL='${{ secrets.AUTH_SERVICE_URL }}' \
              -e CATALOG_SERVICE_URL='${{ secrets.CATALOG_SERVICE_URL }}' \
              -e AUCTION_SERVICE_URL='${{ secrets.AUCTION_SERVICE_URL }}' \
              -e WALLET_SERVICE_URL='${{ secrets.WALLET_SERVICE_URL }}' \
              -e BOOKING_SERVICE_URL='${{ secrets.BOOKING_SERVICE_URL }}' \
              --restart always \
              ghcr.io/${{ github.repository }}:latest
              
            echo "Cleaning up..."
            docker image prune -f
