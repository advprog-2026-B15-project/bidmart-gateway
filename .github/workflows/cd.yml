name: Deploy to AWS EC2

on:
  workflow_run:
    workflows:
      - "Continuous Integration"
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar 

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$REPO_LOWER:latest .
          docker push ghcr.io/$REPO_LOWER:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Copy docker-compose to Gateway EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_GATEWAY_HOST }}
          username: ${{ secrets.EC2_GATEWAY_USERNAME }}
          key: ${{ secrets.EC2_GATEWAY_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/"

      - name: Deploy to Gateway EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_GATEWAY_HOST }}
          username: ${{ secrets.EC2_GATEWAY_USERNAME }}
          key: ${{ secrets.EC2_GATEWAY_SSH_KEY }}
          script: |
            export REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            echo "GATEWAY_IMAGE=ghcr.io/$REPO_LOWER:latest" > .env
            
            echo "Pulling latest images..."
            docker compose pull
            
            echo "Starting Gateway and Redis..."
            docker compose up -d
            
            echo "Cleaning up..."
            docker image prune -f
