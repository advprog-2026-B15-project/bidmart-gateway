name: Continuous Deployment (Gateway)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      - name: Copy Dockerfile to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_GATEWAY_HOST }}
          username: ${{ secrets.EC2_GATEWAY_USERNAME }}
          key: ${{ secrets.EC2_GATEWAY_SSH_KEY }}
          source: "Dockerfile"
          target: "/home/ubuntu/"

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_GATEWAY_HOST }}
          username: ${{ secrets.EC2_GATEWAY_USERNAME }}
          key: ${{ secrets.EC2_GATEWAY_SSH_KEY }}
          source: "build/libs/"
          target: "/home/ubuntu/"

      - name: Execute Deployment on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_GATEWAY_HOST }}
          username: ${{ secrets.EC2_GATEWAY_USERNAME }}
          key: ${{ secrets.EC2_GATEWAY_SSH_KEY }}
          script: |
            echo "1. Memastikan Network dan Redis menyala (Abaikan jika sudah ada)"
            docker network create bidmart-net || true
            docker run -d --name bidmart-redis --network bidmart-net -p 6379:6379 redis:alpine || docker start bidmart-redis || true

            echo "2. Hapus container Gateway lama"
            docker rm -f bidmart-gateway || true

            echo "3. Build image Docker baru dari JAR"
            mv /home/ubuntu/build/libs/*.jar /home/ubuntu/gateway-0.0.1-SNAPSHOT.jar || true
            docker build -t bidmart-gateway -f /home/ubuntu/Dockerfile /home/ubuntu/

            echo "4. Jalankan Gateway baru"
            docker run -d \
              --name bidmart-gateway \
              -p 8088:8088 \
              --network bidmart-net \
              -e REDIS_HOST=bidmart-redis \
              --restart always \
              bidmart-gateway

            echo "5. Bersihkan file instalasi & image bekas agar RAM/Disk aman"
            rm /home/ubuntu/gateway-0.0.1-SNAPSHOT.jar || true
            rm -rf /home/ubuntu/build || true
            docker image prune -f
