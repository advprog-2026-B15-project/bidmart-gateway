version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: bidmart-redis
    ports:
      - "127.0.0.1:6379:6379" # Only accessible locally for security
    restart: always

  gateway:
    image: ${GATEWAY_IMAGE:-ghcr.io/advprog-2026-b15-project/bidmart-gateway:latest}
    container_name: bidmart-gateway
    ports:
      - "8080:8080"
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - REDIS_HOST=redis
      - AUTH_SERVICE_URL=http://host.docker.internal:8081
      - CATALOG_SERVICE_URL=http://host.docker.internal:8082
      - AUCTION_SERVICE_URL=http://host.docker.internal:8083
      - WALLET_SERVICE_URL=http://host.docker.internal:8084
      - BOOKING_SERVICE_URL=http://host.docker.internal:8085
    depends_on:
      - redis
    restart: always
